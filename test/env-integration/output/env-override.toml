[app]
  format_test = "toml-output"
  name = "base-app"
  port = 8080
  version = "1.0.0"

[database]
  host = "localhost"
  name = "myapp"
  port = 5432
  ssl = false
  [database.connection]
    pool_size = 10
    timeout = 30

[features]
  auth = true
  cache = false
  monitoring = true

[logging]
  format = "json"
  level = "info"
  outputs = ["stdout", "file"]

[nested]
  [nested.deep]
    [nested.deep.very]
      [nested.deep.very.deep]
        value = "original"
